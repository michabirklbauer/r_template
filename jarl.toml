[lint]
# Only report violations about performance or correctness.
select = ["PERF", "CORR"]
extend-select = ["COMM", "READ", "SUSP", "TESTTHAT"]
ignore = []
# If "--fix" is used, only apply automatic fixes to specified violations.
fixable = ["PERF"]
# Include the specified files.
# include = ["directory/"]
# Exclude one or several specific files.
exclude = []
# Use the default set of excluded files (mostly files that are automatically
# generated by other tools).
default-exclude = true
# Check code in roxygen2 comments.
check-roxygen = true
# Apply automatic fixes to code in roxygen2 comments.
fix-roxygen = false
